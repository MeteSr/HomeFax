name: Code Coverage

on:
  push:
    branches: [main]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install DFX
        run: DFXVM_INIT_YES_TO_ALL=true sh -c "$(curl -fsSL https://internetcomputer.org/install.sh)"
      - name: Run tests with coverage
        run: bash scripts/test-backend.sh
